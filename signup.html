<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account – Virginia Museum of Fine Arts</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">

  <div class="login-page-wrap">
    <div class="login-card">
      <a href="index.html" class="login-back-link">&larr; Back to VMFA</a>

      <div class="login-logo">
        <div class="logo-letters">
          <span class="logo-v">V</span><span class="logo-m">M</span><span class="logo-f">F</span><span class="logo-a">A</span>
        </div>
        <div class="logo-name">Virginia Museum<br>of Fine Arts</div>
      </div>

      <h1 class="login-heading">Create Account</h1>
      <p class="login-subheading">Join VMFA to reserve tickets, save artworks to your personal collection, and access exclusive member features.</p>

      <form id="signupForm" class="login-form" novalidate>
        <div class="login-field-row">
          <div class="login-field">
            <label for="signupFirst">First Name</label>
            <input type="text" id="signupFirst" name="firstName" placeholder="First name" autocomplete="given-name" required />
          </div>
          <div class="login-field">
            <label for="signupLast">Last Name</label>
            <input type="text" id="signupLast" name="lastName" placeholder="Last name" autocomplete="family-name" required />
          </div>
        </div>
        <div class="login-field">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" name="email" placeholder="your@email.com" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="password" placeholder="At least 6 characters" autocomplete="new-password" required />
        </div>
        <p id="signupError" class="login-error" aria-live="polite"></p>
        <button type="submit" class="login-submit-btn">Create Account &rarr;</button>
      </form>

      <p class="login-switch-link">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
